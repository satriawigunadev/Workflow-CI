name: Machine Learning Workflow CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  mlops-ci-pipeline:
    runs-on: ubuntu-latest

    steps:
      # Langkah 1: Ambil semua kode dari repositori
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Langkah 2: Setup Python di Runner Virtual
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Langkah 3: Instalasi dependensi lengkap di Ubuntu Runner
      - name: Install CI Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.13.0 scikit-learn==1.5.0 pandas numpy

      # Langkah 4: Eksekusi Re-Training Otomatis Menggunakan MLflow Project
      - name: Run MLflow Project Training
        run: |
          mlflow run MLProject/ --entry-point main --backend local \
          --env-manager local \
          --experiment-name "Credit_Card_Default_Baseline" \
          -P n_estimators=100 -P max_depth=10

      # Langkah 5 & 6: Komit dan Push otomatis file model baru kembali ke GitHub master jika ada update
      - name: Commit and Push Saved Model Artifacts
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add MLProject/saved_model/ || true
          git commit -m "chore: auto-update trained model artifacts from CI pipeline [skip ci]" || echo "No changes to commit"
          git push origin master || echo "No changes to push"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Langkah 7: Build Model Menjadi Docker Image via mlflow build-docker (Kriteria Advance)
      - name: Build MLflow Model Docker Image
        run: |
          if [ -f "MLProject/saved_model/MLmodel" ]; then
            echo "Berkas MLmodel terdeteksi! Memulai proses build-docker..."
            mlflow models build-docker \
              -m "MLProject/saved_model" \
              -n "satriawigunadev/credit-card-model:latest" \
              --env-manager local
            echo "Docker Image berhasil dibuat via mlflow build-docker!"
          else
            echo "[EROR] Berkas MLmodel tidak ditemukan di MLProject/saved_model/"
            exit 1
          fi
